apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisperwealth
  namespace: whisperwealth
  labels:
    app: whisperwealth
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: whisperwealth
  template:
    metadata:
      labels:
        app: whisperwealth
    spec:
      containers:
        - name: whisperwealth
          image: ghcr.io/parthghetia-rh/whisper-wealth:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: DB_PATH
              value: /data/portfolio.db
            - name: TOKEN_PATH
              value: /data/.auth-token
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: whisperwealth-data
